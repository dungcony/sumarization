# Phase 2: tiếp tục fine-tune ViT5 trên dữ liệu CSV chuyên ngành.
phase:
  name: "phase_2" # Tên phase, dùng để phân biệt các giai đoạn fine-tune.
  description: "Fine-tune toàn bộ ViT5-base trên dữ liệu CSV chuyên ngành." # Mô tả ngắn gọn về phase.

model:
  name_or_path: /kaggle/working/outputs_phase_1/vit5_base/best # Khi chạy nối phase, ghi đè bằng đường dẫn checkpoint tốt nhất của phase 1.
  use_fast_tokenizer: false # ViT5 dùng SentencePiece; tokenizer chậm ổn định hơn.
  trust_remote_code: false # Không chạy mã tùy chỉnh từ model repository.

data:
  # Bộ medical sạch chỉ giữ một biến thể nguồn và được chia toàn cục để tránh leakage.
  train_file: "data/phase_2/train_*.*" # Dữ liệu chuyên ngành dùng để cập nhật trọng số.
  valid_file: "data/phase_2/validation_*.*" # Dữ liệu chọn checkpoint phase 2 tốt nhất.
  test_file: "data/phase_2/test_*.*" # Dữ liệu đánh giá cuối cùng, không dùng để tune.
  source_prefix: "summarize: " # Phải nhất quán với prefix đã dùng ở phase 1.
  max_source_length: 768 # Số token nguồn tối đa; phần vượt quá sẽ bị cắt.
  max_target_length: 160 # Số token summary chuẩn tối đa khi tính loss.

training:
  output_dir: "outputs_phase_2/vit5_base" # Nơi lưu phase 2; nên dùng thư mục riêng nếu muốn giữ nguyên phase 1.
  seed: 42 # Seed giúp các lần chạy dễ tái lập hơn.
  num_train_epochs: 3 # Số lần model đi qua toàn bộ tập train chuyên ngành.
  per_device_train_batch_size: 4 # Số mẫu trên mỗi thiết bị cho một forward pass train.
  per_device_eval_batch_size: 8 # Số mẫu trên mỗi thiết bị khi validation/test.
  gradient_accumulation_steps: 2 # Effective batch mỗi thiết bị = 4 x 2 = 8.
  learning_rate: 0.000005 # Learning rate cực đại: 3e-5; phase 2 thường nên kiểm tra LR thấp hơn.
  weight_decay: 0.005 # Regularization giúp hạn chế overfitting trọng số.
  warmup_ratio: 0.1 # 10% bước đầu tăng dần learning rate.
  lr_scheduler_type: "cosine" # Giảm learning rate theo đường cosine sau warmup.
  label_smoothing_factor: 0.05 # Làm mềm nhãn để giảm overconfidence.
  precision: "auto" # Tự chọn bf16/fp16/fp32 theo phần cứng.
  eval_strategy: "steps" # Chạy validation theo số optimizer step.
  eval_steps: 250 # Cứ 250 optimizer step chạy validation một lần.
  save_strategy: "steps" # Lưu checkpoint theo số optimizer step.
  save_steps: 250 # Cứ 250 optimizer step lưu một checkpoint.
  save_total_limit: 2 # Chỉ giữ tối đa hai checkpoint để tiết kiệm dung lượng.
  logging_steps: 100 # Cứ 100 optimizer step ghi loss và learning rate.
  metric_for_best_model: "rougeL" # Dùng ROUGE-L để xếp hạng checkpoint.
  greater_is_better: true # ROUGE-L càng cao thì checkpoint càng tốt.
  load_best_model_at_end: true # Kết thúc train sẽ nạp lại checkpoint tốt nhất.
  early_stopping_patience: 5 # Dừng sau 5 lần validation liên tiếp không cải thiện.

generation:
  # Các thuộc tính dưới đây chi phối lúc sinh summary khi eval/inference,
  # không thay đổi cách labels được cắt trong quá trình train.
  max_length: 160 # Tổng số token tối đa model được phép sinh.
  min_length: 10 # Số token tối thiểu trước khi model được phép kết thúc.
  num_beams: 4 # Số nhánh beam search; cao hơn có thể tăng chất lượng nhưng không luôn luôn.
  length_penalty: 1.0 # >1 ưu tiên summary dài hơn; <1 ưu tiên summary ngắn hơn.
  no_repeat_ngram_size: 3 # Không cho lặp lại nguyên cụm 3 token.
  repetition_penalty: 1.0 # 1.0 là không phạt lặp token bổ sung.
  early_stopping: true # Dừng beam search khi các nhánh phù hợp đã hoàn tất.

lora:
  enabled: false # False = full fine-tuning toàn bộ tham số, không dùng LoRA.
